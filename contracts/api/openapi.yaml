openapi: 3.0.3
info:
  title: BqLee Blog API
  version: 0.1.0
  description: BqLee 个人博客系统后端 API

servers:
  - url: /api/v1
    description: Development

security: []

paths:
  /auth/login:
    post:
      operationId: authLogin
      summary: 用户登录
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /auth/sendcode:
    post:
      operationId: authSendCode
      summary: 发送邮箱验证码
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: 验证码发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          retry_after_seconds:
                            type: integer
        "400":
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "409":
          description: 邮箱已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "429":
          description: 发送过于频繁
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /auth/register:
    post:
      operationId: authRegister
      summary: 用户注册
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user_id:
                            type: integer
        "400":
          description: 请求参数无效或验证码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "409":
          description: 邮箱已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /auth/refresh:
    post:
      operationId: authRefresh
      summary: 刷新 Token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      parameters:
        - name: Authorization
          in: header
          description: 也可通过 Bearer refresh_token 方式传递
          schema:
            type: string
      responses:
        "200":
          description: Token 刷新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenPair"
        "400":
          description: refresh_token 缺失
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: refresh_token 无效或过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /auth/me:
    get:
      operationId: authMe
      summary: 获取当前用户信息
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MeResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /articles:
    get:
      operationId: listArticles
      summary: 获取文章列表
      tags: [Article]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: status
          in: query
          description: "未认证用户只能查看 published；认证普通用户可查看自己的 draft/published/archived"
          schema:
            type: string
            enum: [draft, published, archived]
      security: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ArticleListData"
    post:
      operationId: createArticle
      summary: 创建文章
      tags: [Article]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ArticleDetail"
        "400":
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /articles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getArticle
      summary: 获取文章详情
      tags: [Article]
      security: []
      responses:
        "200":
          description: 成功（未发布文章仅作者或管理员可见）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ArticleDetail"
        "404":
          description: 文章不存在或无权访问
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    put:
      operationId: updateArticle
      summary: 更新文章
      tags: [Article]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArticleRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          description: 无权修改此文章
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: 文章不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    delete:
      operationId: deleteArticle
      summary: 删除文章（软删除）
      tags: [Article]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          description: 无权删除此文章
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: 文章不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /categories:
    get:
      operationId: listCategories
      summary: 获取分类列表（支持层级）
      tags: [Category]
      security: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Category"

  /tags:
    get:
      operationId: listTags
      summary: 获取标签列表
      tags: [Tag]
      security: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Tag"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        message:
          type: string
        data:
          description: 业务数据
        requestId:
          type: string
          description: 请求追踪 ID
        code:
          type: string
          description: 业务错误码（仅在需要细分错误时使用）

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required: [username, email, password, code]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        code:
          type: string
          description: 邮箱验证码

    TokenPair:
      type: object
      properties:
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        refresh_token:
          type: string
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserBrief"
        tokens:
          $ref: "#/components/schemas/TokenPair"

    UserBrief:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        email:
          type: string
        role_id:
          type: integer
          enum: [0, 1, 2]
          description: "0=普通用户, 1=管理员, 2=超级管理员"

    MeResponse:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        role_id:
          type: integer
        token_type:
          type: string

    CreateArticleRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
          minLength: 1
        summary:
          type: string
          maxLength: 500
        cover_image:
          type: string
          maxLength: 255
        status:
          type: string
          enum: [draft, published]
          default: draft

    UpdateArticleRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
          minLength: 1
        summary:
          type: string
          maxLength: 500
        cover_image:
          type: string
          maxLength: 255
        status:
          type: string
          enum: [draft, published, archived]

    ArticleListItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        cover_image:
          type: string
        author_id:
          type: integer
        author:
          $ref: "#/components/schemas/ArticleAuthor"
        status:
          type: string
          enum: [draft, published, archived]
        view_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ArticleDetail:
      allOf:
        - $ref: "#/components/schemas/ArticleListItem"
        - type: object
          properties:
            content:
              type: string

    ArticleAuthor:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string

    ArticleListData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArticleListItem"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        parent_id:
          type: integer
          nullable: true
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        color:
          type: string
          description: "#hex 颜色值"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
